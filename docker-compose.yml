# =============================================================================
# docker-compose.yml
# Orchestrates three services: db (PostgreSQL), backend (FastAPI), frontend (nginx)
# Phase 9: all three services fully wired together.
# =============================================================================

services:
  # ── PostgreSQL database ───────────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── FastAPI backend ───────────────────────────────────────────────────────
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # Override DATABASE_URL to use Docker service name 'db' instead of localhost
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
    depends_on:
      db:
        condition: service_healthy
    # Run Alembic migrations first, then start Uvicorn
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"

  # ── React + nginx frontend ───────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      args:
        # VITE_API_BASE_URL is baked into the bundle at build time.
        # In production, set this to your deployed backend URL.
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
    ports:
      - "5173:80"
    depends_on:
      - backend

# ── Named volumes ─────────────────────────────────────────────────────────────
volumes:
  postgres_data:
