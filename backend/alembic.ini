# alembic.ini — Alembic configuration for the backend.
#
# The sqlalchemy.url below is a placeholder. The real URL is injected
# at runtime by alembic/env.py which reads settings.database_url from
# the pydantic-settings object (which in turn reads from backend/.env).
# Do NOT hardcode credentials here.

[alembic]
# Path to the Alembic scripts directory (relative to this file)
script_location = alembic

# Add the backend directory itself to sys.path so `from app.xxx import ...`
# works inside env.py without needing PYTHONPATH set manually.
prepend_sys_path = .

# Template for new migration file names
file_template = %%(rev)s_%%(slug)s

# Version path separator (os = os.pathsep, : = colon, etc.)
version_path_separator = os

# ---------------------------------------------------------------------------
# Logging configuration
# ---------------------------------------------------------------------------
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
