# frontend/nginx.conf
# Serves the React SPA build output.
# try_files is critical: it ensures all client-side routes (e.g. /products, /orders)
# are handled by index.html so BrowserRouter can take over, instead of returning 404.

server {
    listen 80;

    # Root where `npm run build` outputs to (dist/ → copied to /usr/share/nginx/html)
    root /usr/share/nginx/html;
    index index.html;

    # gzip compression for faster transfer
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;

    location / {
        # Try the exact file, then directory, then fall back to index.html (SPA routing)
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets (JS/CSS bundles have content-hashed names)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
}
